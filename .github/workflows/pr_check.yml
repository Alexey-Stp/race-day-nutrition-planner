name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Check which files changed to determine if ui_screenshots should run
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui_screenshots: ${{ steps.filter.outputs.ui_screenshots }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          ui_screenshots:
            - 'src/RaceDay.Web.React/**'
            - '.github/workflows/pr_check.yml'

  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test & Quality Check
    outputs:
      dotnet-build-cache-key: ${{ steps.dotnet-cache.outputs.cache-hit }}
      npm-build-cache-key: ${{ steps.npm-cache.outputs.cache-hit }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Cache NuGet packages
      id: dotnet-cache
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/RaceDay.Web.React/package-lock.json
    
    - name: Restore .NET dependencies
      run: dotnet restore
    
    - name: Build .NET Solution
      run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=true --verbosity normal
    
    - name: Run Unit Tests with Code Coverage
      run: dotnet test --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed" --collect:"XPlat Code Coverage" --results-directory ./coverage
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Check Coverage Threshold & Report Low Coverage
      run: |
        python3 - <<'EOF'
        import sys, xml.etree.ElementTree as ET, subprocess

        result = subprocess.check_output(['find', './coverage', '-name', 'coverage.cobertura.xml'])
        paths = [l.strip() for l in result.decode().splitlines() if l.strip()]
        if not paths:
            print("❌ No coverage report found!")
            sys.exit(1)
        path = paths[0]

        root = ET.parse(path).getroot()
        overall = float(root.attrib.get('line-rate', '0'))
        pct = round(overall * 100, 1)

        print("\n" + "=" * 60)
        print("📊 CODE COVERAGE REPORT")
        print("=" * 60)
        icon = "✅" if overall >= 0.80 else "❌"
        print(f"{icon} Overall Coverage: {pct}% (Target: 80%)\n")

        print("📁 Classes with Low Coverage (< 50%):")
        for cls in root.iter('class'):
            rate = float(cls.attrib.get('line-rate', '0'))
            if rate < 0.50:
                print(f"  🔴 {cls.attrib['name']}: {round(rate*100,1)}%")

        print("\n📁 Classes with Medium Coverage (50–79%):")
        for cls in root.iter('class'):
            rate = float(cls.attrib.get('line-rate', '0'))
            if 0.50 <= rate < 0.80:
                print(f"  🟡 {cls.attrib['name']}: {round(rate*100,1)}%")

        print("=" * 60)
        if overall < 0.80:
            print("⚠️  Coverage check FAILED")
            sys.exit(1)
        print("✅ Coverage check PASSED")
        EOF
    
    - name: Install React dependencies
      run: npm ci --ignore-scripts
      working-directory: src/RaceDay.Web.React
      continue-on-error: false
    
    - name: Build React Application
      run: npm run build
      working-directory: src/RaceDay.Web.React
      continue-on-error: false
    
    - name: Upload React Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: src/RaceDay.Web.React/dist
        retention-days: 1
    
    - name: Upload .NET Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-build
        path: |
          src/RaceDay.API/bin/Release
          src/RaceDay.Core/bin/Release
        retention-days: 1

  lint-check:
    runs-on: ubuntu-latest
    name: Code Analysis
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Analyze with StyleCop
      run: dotnet build --configuration Release --no-restore /p:EnforceCodeStyleInBuild=true

  web-lint:
    runs-on: ubuntu-latest
    name: TypeScript & React Lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/RaceDay.Web.React/package-lock.json
    
    - name: Install dependencies
      run: npm ci --ignore-scripts
      working-directory: src/RaceDay.Web.React
    
    - name: TypeScript Check
      run: npx tsc --noEmit
      working-directory: src/RaceDay.Web.React
      continue-on-error: false

  ui_screenshots:
    runs-on: ubuntu-latest
    name: UI Screenshots (Mobile & Desktop)
    needs: [changes, build-and-test]
    if: needs.changes.outputs.ui_screenshots == 'true'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/RaceDay.Web.React/package-lock.json
    
    - name: Download React Build Artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: react-build
        path: src/RaceDay.Web.React/dist
    
    - name: Download .NET Build Artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: dotnet-build
        path: build-artifacts
    
    - name: Restore .NET Build from Artifacts
      continue-on-error: true
      run: |
        if [ -d "build-artifacts" ]; then
          mkdir -p src/RaceDay.API/bin/Release
          mkdir -p src/RaceDay.Core/bin/Release
          cp -r build-artifacts/src/RaceDay.API/bin/Release/* src/RaceDay.API/bin/Release/ 2>/dev/null || true
          cp -r build-artifacts/src/RaceDay.Core/bin/Release/* src/RaceDay.Core/bin/Release/ 2>/dev/null || true
          echo "Build artifacts restored from previous job"
        fi
    
    - name: Check if builds are needed
      id: check-builds
      run: |
        if [ -f "src/RaceDay.Web.React/dist/index.html" ] && [ -f "src/RaceDay.API/bin/Release/net10.0/RaceDay.API.dll" ]; then
          echo "builds_exist=true" >> $GITHUB_OUTPUT
          echo "✅ Build artifacts exist, skipping rebuild"
        else
          echo "builds_exist=false" >> $GITHUB_OUTPUT
          echo "⚠️ Build artifacts missing, will rebuild"
        fi
    
    - name: Restore .NET dependencies
      if: steps.check-builds.outputs.builds_exist != 'true'
      run: dotnet restore
    
    - name: Build .NET Solution
      if: steps.check-builds.outputs.builds_exist != 'true'
      run: dotnet build --configuration Release --no-restore
    
    - name: Install React dependencies
      if: steps.check-builds.outputs.builds_exist != 'true'
      run: npm ci --ignore-scripts
      working-directory: src/RaceDay.Web.React
    
    - name: Build React Application
      if: steps.check-builds.outputs.builds_exist != 'true'
      run: npm run build
      working-directory: src/RaceDay.Web.React
    
    - name: Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('src/RaceDay.Web.React/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium
      working-directory: src/RaceDay.Web.React
    
    - name: Start API Server
      run: |
        dotnet run --project src/RaceDay.API/RaceDay.API.csproj --no-build --configuration Release --no-launch-profile &
        API_PID=$!
        echo "API_PID=$API_PID" >> $GITHUB_ENV
        echo "Started API server with PID $API_PID"
      env:
        ASPNETCORE_ENVIRONMENT: Production
        ASPNETCORE_URLS: http://127.0.0.1:8080
    
    - name: Wait for API to be ready
      run: npx -y wait-on tcp:localhost:8080 --timeout 120000
      working-directory: src/RaceDay.Web.React
    
    - name: Start Frontend Preview Server
      run: |
        npm run preview -- --host 127.0.0.1 --port 4173 &
        PREVIEW_PID=$!
        echo "PREVIEW_PID=$PREVIEW_PID" >> $GITHUB_ENV
        echo "Started preview server with PID $PREVIEW_PID"
      working-directory: src/RaceDay.Web.React
      env:
        BASE_URL: http://127.0.0.1:4173
    
    - name: Wait for Preview Server
      run: npx wait-on http://127.0.0.1:4173 --timeout 60000
      working-directory: src/RaceDay.Web.React
    
    - name: Run Playwright Screenshots
      run: npx playwright test --project=mobile --project=desktop
      working-directory: src/RaceDay.Web.React
      env:
        BASE_URL: http://127.0.0.1:4173
    
    - name: Stop Servers
      if: always()
      run: |
        if [ ! -z "$API_PID" ]; then kill $API_PID || true; fi
        if [ ! -z "$PREVIEW_PID" ]; then kill $PREVIEW_PID || true; fi
    
    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: src/RaceDay.Web.React/playwright-report/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: src/RaceDay.Web.React/test-results/
        retention-days: 30
    
    - name: Prepare GitHub Pages Content
      if: always() && github.event.pull_request.head.repo.full_name == github.repository
      id: prepare-pages
      run: |
        mkdir -p ui-preview-dist/screenshots/mobile ui-preview-dist/screenshots/desktop

        if [ -d "src/RaceDay.Web.React/playwright-report" ]; then
          cp -r src/RaceDay.Web.React/playwright-report ui-preview-dist/report
        fi

        if [ -d "src/RaceDay.Web.React/test-results/screenshots/mobile" ]; then
          cp src/RaceDay.Web.React/test-results/screenshots/mobile/*.png ui-preview-dist/screenshots/mobile/ 2>/dev/null || true
        fi
        if [ -d "src/RaceDay.Web.React/test-results/screenshots/desktop" ]; then
          cp src/RaceDay.Web.React/test-results/screenshots/desktop/*.png ui-preview-dist/screenshots/desktop/ 2>/dev/null || true
        fi

        echo "📁 Final structure:"
        find ui-preview-dist -type f | sort
    
    - name: Publish to GitHub Pages
      if: always() && github.event.pull_request.head.repo.full_name == github.repository
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ui-preview-dist
        destination_dir: ui-preview/pr-${{ github.event.pull_request.number }}/latest
        keep_files: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
    
    - name: Extract Repository Info
      if: always() && github.event.pull_request.head.repo.full_name == github.repository
      id: repo-info
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
        echo "Repository: ${{ github.repository_owner }}/$REPO_NAME"
    
    - name: Build PR Comment
      if: always() && github.event.pull_request.head.repo.full_name == github.repository
      id: build-comment
      run: |
        BASE_URL="https://${{ github.repository_owner }}.github.io/${{ steps.repo-info.outputs.repo_name }}/ui-preview/pr-${{ github.event.pull_request.number }}/latest"

        COMMENT="<!-- ui-preview-playwright -->"$'\n'
        COMMENT+="## 📸 UI Preview — Mobile & Desktop"$'\n\n'
        COMMENT+="**[📊 Full Playwright Report](${BASE_URL}/report/index.html)**"$'\n\n'

        COMMENT+="### 📱 Mobile (390×844)"$'\n'
        MOBILE_TABLE="| "
        MOBILE_IMAGES="| "

        for f in ui-preview-dist/screenshots/mobile/*.png; do
          [ -f "$f" ] || continue
          NAME=$(basename "$f" .png)
          MOBILE_TABLE+="$NAME | "
          MOBILE_IMAGES+="![$NAME](${BASE_URL}/screenshots/mobile/${NAME}.png) | "
        done

        if [ "$MOBILE_TABLE" != "| " ]; then
          COMMENT+="$MOBILE_TABLE"$'\n'
          COUNT=$(find ui-preview-dist/screenshots/mobile -name "*.png" | wc -l)
          SEP="| "
          for i in $(seq 1 $COUNT); do SEP+="--- | "; done
          COMMENT+="$SEP"$'\n'
          COMMENT+="$MOBILE_IMAGES"$'\n\n'
        else
          COMMENT+="_No mobile screenshots found_"$'\n\n'
        fi

        COMMENT+="### 🖥️ Desktop (1440×900)"$'\n'
        DESKTOP_TABLE="| "
        DESKTOP_IMAGES="| "

        for f in ui-preview-dist/screenshots/desktop/*.png; do
          [ -f "$f" ] || continue
          NAME=$(basename "$f" .png)
          DESKTOP_TABLE+="$NAME | "
          DESKTOP_IMAGES+="![$NAME](${BASE_URL}/screenshots/desktop/${NAME}.png) | "
        done

        if [ "$DESKTOP_TABLE" != "| " ]; then
          COMMENT+="$DESKTOP_TABLE"$'\n'
          COUNT=$(find ui-preview-dist/screenshots/desktop -name "*.png" | wc -l)
          SEP="| "
          for i in $(seq 1 $COUNT); do SEP+="--- | "; done
          COMMENT+="$SEP"$'\n'
          COMMENT+="$DESKTOP_IMAGES"$'\n\n'
        else
          COMMENT+="_No desktop screenshots found_"$'\n\n'
        fi

        COMMENT+="---"$'\n'
        COMMENT+="**Fallback:** [Download artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

        echo "$COMMENT" > /tmp/pr-comment.md
    
    - name: Comment on PR
      if: always() && github.event.pull_request.head.repo.full_name == github.repository
      uses: peter-evans/create-or-update-comment@v4
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body-path: /tmp/pr-comment.md
        comment-author: 'github-actions[bot]'

